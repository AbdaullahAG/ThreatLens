<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ThreatLens — Multi-Source Threat Intelligence CLI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E14"/>
      <stop offset="100%" stop-color="#111A28"/>
    </linearGradient>
    <radialGradient id="scanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- HUD grid -->
  <g stroke="#1E2A3A" stroke-width="1">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="60" y1="0" x2="60" y2="320"/>
    <line x1="1140" y1="0" x2="1140" y2="320"/>
  </g>
  <g stroke="#182230" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="230" x2="1200" y2="230"/>
  </g>

  <!-- corner ticks -->
  <g stroke="#2DD4EE" stroke-width="2" opacity="0.8">
    <path d="M20 20 L20 44 M20 20 L44 20"/>
    <path d="M1180 20 L1180 44 M1180 20 L1156 20"/>
    <path d="M20 300 L20 276 M20 300 L44 300"/>
    <path d="M1180 300 L1180 276 M1180 300 L1156 300"/>
  </g>

  <!-- Radar signature, right side -->
  <g transform="translate(945,160)">
    <circle r="120" fill="url(#scanGlow)"/>
    <circle r="105" fill="none" stroke="#1E3A4A" stroke-width="1"/>
    <circle r="72" fill="none" stroke="#1E3A4A" stroke-width="1"/>
    <circle r="40" fill="none" stroke="#1E3A4A" stroke-width="1"/>

    <!-- rotating sweep -->
    <g>
      <path d="M0 0 L0 -105 A105 105 0 0 1 74.2 -74.2 Z" fill="url(#sweep)" opacity="0.55"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="6s" repeatCount="indefinite"/>
    </g>

    <!-- 6 source nodes representing the 6 APIs -->
    <g fill="#7DE0F2">
      <circle cx="0" cy="-105" r="4.5"/>
      <circle cx="91" cy="-52.5" r="4.5"/>
      <circle cx="91" cy="52.5" r="4.5"/>
      <circle cx="0" cy="105" r="4.5"/>
      <circle cx="-91" cy="52.5" r="4.5"/>
      <circle cx="-91" cy="-52.5" r="4.5"/>
    </g>
    <g stroke="#2A5568" stroke-width="1" stroke-dasharray="2 4">
      <line x1="0" y1="0" x2="0" y2="-105"/>
      <line x1="0" y1="0" x2="91" y2="-52.5"/>
      <line x1="0" y1="0" x2="91" y2="52.5"/>
      <line x1="0" y1="0" x2="0" y2="105"/>
      <line x1="0" y1="0" x2="-91" y2="52.5"/>
      <line x1="0" y1="0" x2="-91" y2="-52.5"/>
    </g>

    <!-- central verdict shield -->
    <g filter="url(#soft)">
      <circle r="20" fill="#0A0E14" stroke="#22D3EE" stroke-width="2"/>
    </g>
    <circle r="20" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
    <path d="M-8 -2 L-3 5 L9 -8" fill="none" stroke="#7DE0F2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace">
    <text x="70" y="150" font-size="58" font-weight="700" fill="#F1F5F9">Threat<tspan fill="#22D3EE">Lens</tspan></text>
    <text x="72" y="184" font-size="17" letter-spacing="2.5" fill="#7B8CA3">MULTI-SOURCE THREAT INTELLIGENCE · CLI</text>

    <!-- prompt line -->
    <text x="72" y="228" font-size="15" fill="#4FD1C5">$ <tspan fill="#C6D3E3">threatlens -i 45.33.32.156</tspan><tspan fill="#3C4A5C"> --format all</tspan></text>
  </g>

  <!-- baseline tag row -->
  <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="12.5" fill="#5B6B80">
    <text x="72" y="262">6 APIS</text>
    <circle cx="150" cy="258" r="2" fill="#3C4A5C"/>
    <text x="164" y="262">5 IOC TYPES</text>
    <circle cx="266" cy="258" r="2" fill="#3C4A5C"/>
    <text x="280" y="262">EXCEL · JSON · CSV</text>
  </g>
</svg>
